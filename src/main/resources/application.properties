spring.application.name=LLMScoring
spring.datasource.url=${LLM_SCORING_DB_URL:jdbc:mysql://localhost:3306/llm_scoring?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false}
spring.datasource.username=root
spring.datasource.password=123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false
spring.sql.init.mode=always
spring.sql.init.encoding=UTF-8
spring.web.error.include-message=always

# LLM scoring: uses an OpenAI-compatible /chat/completions endpoint.
app.llm.enabled=${LLM_SCORING_LLM_ENABLED:true}
app.llm.base-url=${LLM_SCORING_LLM_BASE_URL:https://dashscope.aliyuncs.com/compatible-mode/v1}
app.llm.api-key=${LLM_SCORING_LLM_API_KEY:sk-9b84dd7be19045be931deb67ebba9baa}
app.llm.model=${LLM_SCORING_LLM_MODEL:qwen3.5-flash}
app.llm.temperature=${LLM_SCORING_LLM_TEMPERATURE:0.1}
app.llm.max-completion-tokens=${LLM_SCORING_LLM_MAX_COMPLETION_TOKENS:1200}
app.llm.connect-timeout-seconds=${LLM_SCORING_LLM_CONNECT_TIMEOUT_SECONDS:10}
app.llm.read-timeout-seconds=${LLM_SCORING_LLM_READ_TIMEOUT_SECONDS:60}
app.llm.fallback-to-heuristic=${LLM_SCORING_LLM_FALLBACK_TO_HEURISTIC:true}
app.llm.json-mode=${LLM_SCORING_LLM_JSON_MODE:true}
